name: Frontend CI/CD (Build & Deploy)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:


permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build, Push & Deploy to Dokploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci

      # Set up Docker Buildx for cached multi-stage builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to GitHub Container Registry (GHCR)
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push the Docker image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          build-args: |
            VITE_API_URL=https://fit.api.stv10.com
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Connect to Tailscale to access the private Dokploy instance
      - name: Connect to Tailscale
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}

      # Trigger redeployment on Dokploy using the Tailscale private URL
      - name: Trigger Dokploy Deploy
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: |
          curl -X POST "${{ secrets.DOKPLOY_WEBHOOK_URL }}"
